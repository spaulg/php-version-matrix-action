name: 'Version matrix'
description: 'Generate a version matrix'

inputs:
  min:
    description: 'Minimum version to include in the matrix'
    required: true
    default: "7.0"

  extra_matrix:
    description: |
      Optional YAML to deep-merge into the generated matrix.
      Example:
        include:
          - short_sem_version: "8.4+custom"
            full_sem_version: "8.4.0+custom"
            short_version: "8.4"
    required: false
    default: ""

outputs:
  matrix:
    description: Generated version matrix
    value: ${{ steps.generate-matrix.outputs.matrix }}

runs:
  using: 'composite'
  steps:
      - shell: bash
        working-directory: ${{ github.action_path }}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip3 install -r requirements.txt

      - shell: bash
        id: generate-matrix
        working-directory: ${{ github.action_path }}
        run: |
          EXTRA_MATRIX_FILE=""
          if [ -n "${{ inputs.extra_matrix }}" ]; then
            EXTRA_MATRIX_FILE="extra_matrix.yml"
            cat > "$EXTRA_MATRIX_FILE" <<'YAML'
          ${{ inputs.extra_matrix }}
          YAML
          fi

          if [ -n "$EXTRA_MATRIX_FILE" ]; then
            echo "matrix=$(python3 build_versions.py --min-version "${{ inputs.min }}" --extra-matrix-yaml-file "$EXTRA_MATRIX_FILE")" >> $GITHUB_OUTPUT
          else
            echo "matrix=$(python3 build_versions.py --min-version "${{ inputs.min }}")" >> $GITHUB_OUTPUT
          fi
